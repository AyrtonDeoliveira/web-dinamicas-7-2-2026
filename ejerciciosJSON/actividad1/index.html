<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ejercicio 1 — Lista de personas</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="page-header">
    <h1>Lista de personas</h1>
    <p>Datos cargados desde <code>personas.json</code></p>
  </header>

  <div class="metrics">
    <div class="metric-card">
      <div class="label">Total</div>
      <div class="value" id="m-total">—</div>
    </div>
    <div class="metric-card">
      <div class="label">Edad promedio</div>
      <div class="value" id="m-avg">—</div>
    </div>
    <div class="metric-card">
      <div class="label">Edad mínima</div>
      <div class="value" id="m-min">—</div>
    </div>
    <div class="metric-card">
      <div class="label">Edad máxima</div>
      <div class="value" id="m-max">—</div>
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Edad</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <script src="app.js"></script>
</body>
</html>
